<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Departure Board - Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .preview-header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .preview-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .preview-header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header {
            background: #f5f5f5;
            padding: 20px 24px;
            border-bottom: 2px solid #e0e0e0;
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
        }

        .departure-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px 110px 120px;
            gap: 16px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .departure-row:last-child {
            border-bottom: none;
        }

        .departure-row:hover {
            background: #fafafa;
            transition: background 0.2s ease;
        }

        .time {
            font-weight: 700;
            font-size: 1.3em;
            color: #000;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .minutes {
            text-align: center;
            color: #666;
            font-weight: 600;
            font-size: 0.95em;
        }

        .destination {
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .platform {
            text-align: center;
            font-weight: 600;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            color: #666;
            font-size: 0.9em;
        }

        .status {
            text-align: right;
            font-weight: 600;
            font-size: 0.95em;
        }

        .status.on-time {
            color: #4caf50;
        }

        .status.delayed {
            color: #ff9800;
        }

        .status.cancelled {
            color: #f44336;
        }

        .no-departures {
            padding: 40px 24px;
            text-align: center;
            color: #999;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: white;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .info-box code {
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        /* small responsive tweaks for via lines in the preview */
        .destination .via { display:block; }

        @media (max-width: 768px) {
            .departure-row {
                grid-template-columns: 60px 1fr 100px;
                gap: 8px;
                padding: 12px 16px;
                font-size: 13px;
            }

            .status {
                grid-column: 2 / 4;
                text-align: left;
                margin-top: 4px;
            }

            .card-header {
                font-size: 1.2em;
                padding: 16px;
            }

            .time {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="preview-header">
            <h1>🚆 Train Departure Board</h1>
            <p>Home Assistant Custom Card Preview</p>
        </div>

        <div id="card-host"></div>
    </div>

    <script type="module">
        // import card bundle built locally
        // @ts-ignore
        import './ha-train-departure-board.js';

        // Sample sensor object (from the data you provided). This mirrors the actual HA sensor payload
        const sampleHass = {
            states: {
                'sensor.train_deps': {
                    entity_id: 'sensor.train_deps',
                    attributes: {
                        departures: [
                            {
                                origin_name: 'Dartford',
                                destination_name: 'London Cannon Street',
                                service_uid: 'P15519',
                                scheduled: '15-11-2025 18:13',
                                estimated: '15-11-2025 18:13',
                                minutes: 12,
                                platform: '1',
                                operator_name: 'Southeastern',
                                length: 10,
                                stock: 'City Beam',
                                stops_of_interest: [
                                    {
                                        stop: 'LBG',
                                        name: 'London Bridge',
                                        scheduled_stop: '15-11-2025 18:30',
                                        estimate_stop: '15-11-2025 18:30',
                                        journey_time_mins: 17,
                                        stops: 8,
                                    }
                                ],
                                stops: 14
                            },
                            {
                                origin_name: 'Dartford',
                                destination_name: 'London Charing Cross',
                                service_uid: 'P16688',
                                scheduled: '15-11-2025 18:21',
                                estimated: '15-11-2025 18:24',
                                minutes: 23,
                                platform: '1',
                                operator_name: 'Southeastern',
                                length: 8,
                                stock: 'Javelin',
                                stops_of_interest: [
                                    {
                                        stop: 'LBG',
                                        name: 'London Bridge',
                                        scheduled_stop: '15-11-2025 18:33',
                                        estimate_stop: '15-11-2025 18:36',
                                        journey_time_mins: 12,
                                        stops: 8,
                                    }
                                ],
                                stops: 11
                            },
                            {
                                origin_name: 'Gravesend',
                                destination_name: 'London Victoria',
                                service_uid: 'P15912',
                                scheduled: '15-11-2025 18:28',
                                estimated: '15-11-2025 18:33',
                                minutes: 28,
                                platform: '1',
                                operator_name: 'Southeastern',
                                length: 12,
                                stock: 'Networker',
                                stops_of_interest: [],
                                stops: 14
                            }
                        ]
                    }
                }
            }
        };

        // Create a card and append it to the preview
        const card = document.createElement('train-departure-board');
        card.config = {
            type: 'custom:train-departure-board',
            title: 'Train Departures',
            entity: 'sensor.train_deps',
            attribute: 'departures'
        };
        // Provide Home Assistant-like object
        card.hass = sampleHass;

        const host = document.getElementById('card-host');
        host.innerHTML = '';
        host.appendChild(card);
    </script>
</body>
</html>
